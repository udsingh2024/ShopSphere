version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: shopsphere_db
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./server
    container_name: shopsphere_backend
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/shopsphere
      - JWT_SECRET=development_jwt_secret_signing_key_1234
      - JWT_REFRESH_SECRET=development_jwt_refresh_secret_signing_key_1234
      - CLIENT_URL=http://localhost

  frontend:
    build: ./client
    container_name: shopsphere_frontend
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  mongo_data:
